name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs for GitHub Pages
        run: npm run build -- --configuration production --base-href /My-Portfolio/ --output-path docs

      - name: Prepare SPA fallback
        run: |
          cp docs/index.html docs/404.html
          touch docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes detected."
            exit 0
          fi
          git commit -m "chore: rebuild docs for GitHub Pages"
          git push
